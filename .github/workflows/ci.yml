name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pane.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pane
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: pane
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pane

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libgtk-3-dev libwayland-dev libxcb1-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin pane --no-default-features --features nvidia

      - name: Clippy
        run: cargo clippy --release --target ${{ matrix.target }} --bin pane --no-default-features --features nvidia -- -D warnings
        if: matrix.target == 'x86_64-pc-windows-msvc'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pane-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/pane-x86_64-pc-windows-msvc/pane.exe release/pane-windows-x64.exe
          cp artifacts/pane-x86_64-unknown-linux-gnu/pane release/pane-linux-x64
          cp artifacts/pane-x86_64-apple-darwin/pane release/pane-macos-x64
          cp artifacts/pane-aarch64-apple-darwin/pane release/pane-macos-arm64
          chmod +x release/pane-linux-x64 release/pane-macos-x64 release/pane-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
